name: Public Jellyfin Server (Private Sync)

on: [workflow_dispatch]

jobs:
  jellyfin-runner:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the public workflow repo normally
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      # Step 2: Clone your private "meh" repo into a separate sub-folder
      - name: Checkout Private Storage Repo
        uses: actions/checkout@v4
        with:
          repository: 's7rc/meh'
          token: ${{ secrets.MEH }} # Uses your secret PAT
          path: 'private-meh' # Clones it directly into a folder named 'private-meh'

      # Step 3: Install Jellyfin
      - name: Install Jellyfin Media Server
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl -fsSL https://repo.jellyfin.org/ubuntu/jellyfin_team.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=$(dpkg --print-architecture)] https://repo.jellyfin.org/ubuntu $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin
          sudo systemctl stop jellyfin

      # Step 4: Restore configs and fix permissions using dynamic paths
      - name: Restore State & Fix Permissions
        run: |
          mkdir -p "${{ github.workspace }}/private-meh/jellyfin-data/var-lib"
          mkdir -p "${{ github.workspace }}/private-meh/jellyfin-data/etc-jellyfin"
          
          if [ -d "${{ github.workspace }}/private-meh/jellyfin-data/var-lib" ]; then
            echo "🔄 Restoring saved database state..."
            sudo rsync -av "${{ github.workspace }}/private-meh/jellyfin-data/var-lib/" /var/lib/jellyfin/
            sudo rsync -av "${{ github.workspace }}/private-meh/jellyfin-data/etc-jellyfin/" /etc/jellyfin/
          fi
          
          # CRITICAL: Ensure jellyfin user owns the restored database completely before boot
          sudo chown -R jellyfin:jellyfin /var/lib/jellyfin /etc/jellyfin /var/cache/jellyfin
          
          # CRITICAL: Blow away permission locks on the workspace data folders so Jellyfin can write to them
          sudo chmod -R 777 "${{ github.workspace }}/private-meh"
          
          sudo systemctl start jellyfin

      # Step 5: Install Cloudflared
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # Step 6: Launch Tunnel & Update Permanent Link
      - name: Launch Tunnel & Update Permanent Link
        env:
          DUB_API_KEY: ${{ secrets.DUB_API_KEY }}
          DUB_LINK_ID: ${{ secrets.DUB_LINK_ID }}
        run: |
          nohup cloudflared tunnel --url http://localhost:8096 --no-chunked-encoding > cloudflare.log 2>&1 &
          sleep 8
          
          CF_URL=$(grep -o 'https://.*\.trycloudflare\.com' cloudflare.log | head -1)
          
          # If Dub.co API keys are provided, patch the shortlink
          if [ ! -z "$DUB_API_KEY" ]; then
            curl -s -X PATCH "https://api.dub.co/links/$DUB_LINK_ID" \
              -H "Authorization: Bearer $DUB_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"url\": \"$CF_URL\"}"
          fi
            
          echo "=================================================="
          echo "          STREAM LINK LIVE                        "
          echo "=================================================="
          echo "Current CF Target: $CF_URL"
          echo "=================================================="
          
          # Sleep for 5 hours (18000 seconds) then begin auto-save
          sleep 18000

      # Step 7: Stop Jellyfin, copy data back to private subfolder, and push to s7rc/meh
      - name: Safe Shutdown & Push to s7rc/meh
        if: always()
        run: |
          echo "🛑 Requesting Jellyfin system shutdown..."
          sudo systemctl stop jellyfin
          
          # SAFETY BUFFER: Wait 15 seconds for SQLite to fully close handles and flush WAL files
          echo "⏳ Waiting for database write-ahead logs to merge cleanly..."
          sleep 15
          
          # Sync files down to workspace
          sudo rsync -av --delete /var/lib/jellyfin/ "${{ github.workspace }}/private-meh/jellyfin-data/var-lib/"
          sudo rsync -av --delete /etc/jellyfin/ "${{ github.workspace }}/private-meh/jellyfin-data/etc-jellyfin/"
          
          sudo chown -R runner:docker "${{ github.workspace }}/private-meh/jellyfin-data"
          
          cd "${{ github.workspace }}/private-meh"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add jellyfin-data/
          
          if git diff-index --quiet HEAD; then
            echo "ℹ️ No changes detected. Skipping push."
          else
            git commit -m "Automated Jellyfin State Backup [Skip CI]"
            git push origin HEAD
            echo "💾 Database securely pushed to s7rc/meh without corruption!"
          fi
