name: Public Jellyfin Server (Docker)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  jellyfin-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Checkout Private Storage Repo
        uses: actions/checkout@v4
        with:
          repository: 's7rc/meh'
          token: ${{ secrets.MEH }}
          path: 'private-meh'

      - name: Get cache week key
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Jellyfin Docker Image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: /tmp/jellyfin.tar.gz
          key: jellyfin-image-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: jellyfin-image-${{ runner.os }}-

      - name: Pull & Save Image
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          docker pull lscr.io/linuxserver/jellyfin:latest
          docker save lscr.io/linuxserver/jellyfin:latest | gzip > /tmp/jellyfin.tar.gz

      - name: Load Image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/jellyfin.tar.gz

      - name: Restore Jellyfin Config & Metadata
        env:
          GH_TOKEN: ${{ secrets.MEH }}
        run: |
          mkdir -p "${{ github.workspace }}/jellyfin-config"

          if [ -f "${{ github.workspace }}/private-meh/jellyfin-data.tar.gz" ]; then
            echo "📦 Extracting DB..."
            tar -xzf "${{ github.workspace }}/private-meh/jellyfin-data.tar.gz" -C "${{ github.workspace }}"
          fi

          echo "📦 Restoring images from GitHub Releases..."
          cd "${{ github.workspace }}/private-meh"
          if gh release view backup >/dev/null 2>&1; then
            gh release download backup -p metadata.tar.gz -O /tmp/metadata.tar.gz || true
            if [ -f "/tmp/metadata.tar.gz" ]; then
              tar -xzf /tmp/metadata.tar.gz -C "${{ github.workspace }}"
              echo "✅ Images restored!"
            fi
          fi

      - name: Generate Xtream .strm Library
        env:
          M3U_URL:  ${{ secrets.M3U_URL }}
          STRM_OUT: "${{ github.workspace }}/jellyfin-config/media"
          CACHE_DB: "${{ github.workspace }}/jellyfin-config/data/m3u2strm_cache.db"
        run: |
          if [ -z "$M3U_URL" ]; then
            echo "ℹ️ No M3U_URL secret set — skipping strm generation"
          else
            mkdir -p "${{ github.workspace }}/jellyfin-config/media"
            pip install requests -q
            python3 generate_strm.py
          fi

      - name: Start Jellyfin
        run: |
          docker run -d \
            --name jellyfin \
            --network=host \
            -e PUID=$(id -u) \
            -e PGID=$(id -g) \
            -e TZ=Etc/UTC \
            -v "${{ github.workspace }}/jellyfin-config:/config" \
            -v "${{ github.workspace }}/jellyfin-config/media:/media:ro" \
            lscr.io/linuxserver/jellyfin:latest

          echo "⏳ Waiting for Jellyfin to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8096/health > /dev/null 2>&1; then
              echo "✅ Jellyfin is up!"
              break
            fi
            sleep 2
          done

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Launch Tunnel & Update Permanent Link
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          nohup cloudflared tunnel --url http://localhost:8096 --no-chunked-encoding > cloudflare.log 2>&1 &
          sleep 8

          CF_URL=$(grep -o 'https://.*\.trycloudflare\.com' cloudflare.log | head -1)

          echo "$CF_URL" > STREAM.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STREAM.md
          git diff-index --quiet HEAD || git commit -m "stream live [skip ci]"
          git push

          if [ ! -z "$WORKER_URL" ]; then
            curl -sf "$WORKER_URL/_ping" > /dev/null 2>&1 || true
          fi

          sleep 14400

      - name: Safe Shutdown & Push to s7rc/meh
        if: always()
        env:
          GH_TOKEN: ${{ secrets.MEH }}
        run: |
          docker stop jellyfin || true

          cd "${{ github.workspace }}/private-meh"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "🗜️ Compressing DB..."
          tar -czf jellyfin-data.tar.gz -C "${{ github.workspace }}" \
            --exclude="jellyfin-config/metadata" \
            --exclude="jellyfin-config/cache" \
            --exclude="jellyfin-config/log" \
            --exclude="jellyfin-config/transcodes" \
            jellyfin-config

          git add jellyfin-data.tar.gz
          if ! git diff-index --quiet HEAD; then
            git commit --amend -m "Jellyfin DB Rolling Backup [Skip CI]" || git commit -m "Jellyfin DB Rolling Backup [Skip CI]"
            git push origin HEAD --force
          fi

          if [ -d "${{ github.workspace }}/jellyfin-config/metadata" ]; then
            echo "🗜️ Compressing images..."
            tar -czf /tmp/metadata.tar.gz -C "${{ github.workspace }}" jellyfin-config/metadata

            echo "☁️ Uploading images to GitHub Releases..."
            gh release view backup >/dev/null 2>&1 || gh release create backup -t "Rolling Backup" -n "Stores metadata images"
            gh release upload backup /tmp/metadata.tar.gz --clobber
          fi

      - name: Upload Jellyfin Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-server-logs
          path: "${{ github.workspace }}/jellyfin-config/log/"
