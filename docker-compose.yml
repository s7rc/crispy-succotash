version: "3.8"
services:
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    stop_grace_period: 40s
    environment:
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    ports:
      - "20128:20128"
    volumes:
      - omniroute-data:/app/data

volumes:
  omniroute-data:
